name: Build Native Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-installers:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        include:
          - os: windows-latest
            task: buildExePackage
            artifact: build/installers/*.exe
          - os: ubuntu-latest
            task: buildDebPackage
            artifact: build/installers/*.deb
          - os: macos-latest
            task: buildpkgPackage
            artifact: build/installers/*.pkg

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        if: runner.os != 'Windows'

      - name: Build shadowJar and Native Installer
        run: ./gradlew clean shadowJar ${{ matrix.task }}

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rails-18xx-${{ matrix.os }}-installer
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build-installers
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.deb
            artifacts/*.exe
            artifacts/*.pkg
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
