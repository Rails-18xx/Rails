name: Java CI Build

on:
  push:
    branches: [ main, master ]
    tags-ignore:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    name: Verify Code Compiles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Tests and Build Jar
        run: ./gradlew clean test shadowJar